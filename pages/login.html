<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Garvotsav Tuition Classes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-glass scrolled" style="background: var(--glass-bg);">
        <div class="container">
            <a class="navbar-brand" href="../index.html">
                <i class="fa-solid fa-graduation-cap text-primary-accent"></i> Garvotsav
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="../index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="courses.html">Courses</a></li>
                    <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
                <div class="ms-lg-3 mt-3 mt-lg-0">
                    <a href="register.html" class="btn-premium btn-primary-gradient w-100 text-center">Get Started</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="auth-section">
        <div class="container position-relative">
            <div class="row justify-content-center">
                <div class="col-md-9 col-lg-6 col-xl-5" data-aos="fade-up">
                    <div class="glass-card auth-card">
                        <div class="text-center mb-4">
                            <div class="auth-icon mb-3">
                                <i class="fa-solid fa-right-to-bracket"></i>
                            </div>
                            <h1 class="font-heading fw-bold mb-2">Welcome Back</h1>
                            <p class="text-muted mb-0">Login to continue your Garvotsav learning journey.</p>
                        </div>

                        <form data-auth-form data-success-message="Login successful! Redirecting to home page..." novalidate>
                            <div class="alert d-none" data-auth-alert role="alert"></div>

                            <div class="auth-field">
                                <label class="form-label" for="loginEmail">Email Address *</label>
                                <input type="email" class="form-control" id="loginEmail" name="email" placeholder="student@example.com" autocomplete="email">
                                <div class="auth-error" aria-live="polite"></div>
                            </div>

                            <div class="auth-field">
                                <label class="form-label" for="loginPassword">Password *</label>
                                <div class="password-wrap">
                                    <input type="password" class="form-control" id="loginPassword" name="password" placeholder="Enter password" autocomplete="current-password">
                                    <button type="button" class="password-toggle" data-toggle-password="loginPassword" aria-label="Show password">
                                        <i class="fa-solid fa-eye"></i>
                                    </button>
                                </div>
                                <div class="auth-error" aria-live="polite"></div>
                            </div>

                            <button type="submit" class="btn-premium btn-primary-gradient w-100 border-0 mt-2 py-3">
                                Login <i class="fa-solid fa-arrow-right ms-2"></i>
                            </button>
                        </form>

                        <p class="auth-switch text-center mt-4 mb-0">
                            New to Garvotsav? <a href="register.html">Create an account</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer-area courses-footer" data-site-footer></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/auth.js"></script>
</body>
</html>
