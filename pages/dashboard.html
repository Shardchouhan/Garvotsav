<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard | Garvotsav</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="bg-dark">

    <div class="container-fluid min-vh-100 d-flex flex-column p-0">
        <!-- Top Nav (Simplified for Dashboard) -->
        <nav class="navbar navbar-dark bg-transparent py-3 px-4 w-100 position-absolute top-0 z-3">
            <a class="navbar-brand" href="../index.html">
                <i class="fa-solid fa-graduation-cap text-primary-accent"></i> Garvotsav
            </a>
            <a href="../index.html" class="btn btn-outline-glass btn-sm rounded-pill px-3">Back to Home</a>
        </nav>

        <div class="row g-0 flex-grow-1">
            <!-- Left Side: Image/Branding -->
            <div class="col-lg-6 d-none d-lg-flex align-items-center justify-content-center position-relative overflow-hidden" style="background: linear-gradient(135deg, rgba(124,92,252,0.2), rgba(17,17,17,1));">
                <div class="shape-1"></div>
                <div class="shape-2"></div>
                <div class="z-1 p-5 text-center" data-aos="fade-right">
                    <img src="https://images.unsplash.com/photo-1434030216411-0b793f4b4173?q=80&w=2070&auto=format&fit=crop" class="img-fluid rounded-4 shadow-lg mb-4 opacity-75" style="max-height: 400px; object-fit: cover;" alt="Student Studying">
                    <h2 class="text-white font-heading fw-bold">Welcome Back!</h2>
                    <p class="text-muted">Access your notes, homework, test results, and track your attendance.</p>
                </div>
            </div>

            <!-- Right Side: Login Form (Mock) -->
            <div class="col-lg-6 d-flex align-items-center justify-content-center p-4">
                <div class="glass-panel p-5 rounded-4 w-100" style="max-width: 450px;" data-aos="fade-up">
                    <div class="text-center mb-4">
                        <div class="bg-primary rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px;">
                            <i class="fa-solid fa-user-graduate text-white fs-4"></i>
                        </div>
                        <h3 class="text-white font-heading fw-bold">Student Login</h3>
                        <p class="text-muted small">Enter your credentials to access the portal</p>
                    </div>

                    <form id="loginForm" onsubmit="handleLogin(event)">
                        <div class="mb-3">
                            <label class="form-label text-muted small">Student ID or Email</label>
                            <input type="text" class="form-control" placeholder="e.g. GARV1234" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-muted small">Password</label>
                            <input type="password" class="form-control" placeholder="••••••••" required>
                        </div>
                        <div class="d-flex justify-content-between mb-4 small">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="remember">
                                <label class="form-check-label text-muted" for="remember">Remember me</label>
                            </div>
                            <a href="#" class="text-primary text-decoration-none">Forgot Password?</a>
                        </div>
                        <button type="submit" class="btn-premium btn-primary-gradient w-100 border-0 py-3">Login to Dashboard</button>
                    </form>
                    
                    <div id="loginMessage" class="mt-3 text-center small text-success d-none">
                        Login successful! Redirecting to dashboard... (Mock setup)
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer-area courses-footer" data-site-footer></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="../assets/js/main.js"></script>
    <script>
        function handleLogin(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const msg = document.getElementById('loginMessage');
            
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> Authenticating...';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = 'Login to Dashboard';
                btn.disabled = false;
                msg.classList.remove('d-none');
                
                // In a real app, this would redirect to the actual dashboard interface
                setTimeout(() => {
                    msg.innerHTML = "This is a mock UI. In production, you would be redirected to your dashboard.";
                }, 2000);
            }, 1500);
        }
    </script>
</body>
</html>
