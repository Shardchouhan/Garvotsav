<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQs | Garvotsav Tuition Classes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        /* Custom Accordion Styles for Dark Theme */
        .accordion-item {
            background-color: var(--card-bg);
            border: 1px solid var(--glass-border);
            margin-bottom: 1rem;
            border-radius: var(--radius-md) !important;
            overflow: hidden;
        }
        .accordion-button {
            background-color: var(--card-bg);
            color: var(--white);
            font-family: var(--font-heading);
            font-weight: 500;
            padding: 1.25rem;
            box-shadow: none !important;
        }
        .accordion-button:not(.collapsed) {
            background-color: rgba(124, 92, 252, 0.1);
            color: var(--primary-light);
        }
        .accordion-button::after {
            filter: invert(1);
        }
        .accordion-button:not(.collapsed)::after {
            filter: invert(0.5) sepia(1) saturate(5) hue-rotate(220deg);
        }
        .accordion-body {
            color: var(--text-muted);
            background-color: var(--bg-color);
            padding: 1.25rem;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-glass scrolled" style="background: var(--glass-bg);">
        <div class="container">
            <a class="navbar-brand" href="../index.html">
                <i class="fa-solid fa-graduation-cap text-primary-accent"></i> Garvotsav
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="../index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="courses.html">Courses</a></li>
                    <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
                <div class="ms-lg-3 mt-3 mt-lg-0">
                    <a href="register.html" class="btn-premium btn-primary-gradient w-100 text-center">Get Started</a>
                </div>
            </div>
        </div>
    </nav>

    <section class="section-padding bg-dark text-center" style="padding-top: 150px; border-bottom: 1px solid rgba(255,255,255,0.05);">
        <div class="container">
            <h1 class="font-heading fw-bold text-white mb-3" data-aos="fade-up">Frequently Asked <span class="text-primary-accent">Questions</span></h1>
            <p class="text-muted mx-auto" style="max-width: 600px;" data-aos="fade-up" data-aos-delay="100">Find answers to common questions about admissions, batches, and our teaching methodology.</p>
        </div>
    </section>

    <section class="section-padding">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="accordion" id="faqAccordion" data-aos="fade-up">
                        <!-- Loaded dynamically via API -->
                        <div class="text-center py-5" id="faqLoader">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer-area courses-footer" data-site-footer></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const accordion = document.getElementById('faqAccordion');
            const loader = document.getElementById('faqLoader');
            
            try {
                const faqs = await GarvotsavAPI.fetchSheetData('FAQs');
                loader.style.display = 'none';
                
                if (faqs.length === 0) {
                    accordion.innerHTML = '<p class="text-center text-muted">No FAQs available at the moment.</p>';
                    return;
                }

                faqs.forEach((faq, index) => {
                    const item = document.createElement('div');
                    item.className = 'accordion-item';
                    
                    const isExpanded = index === 0 ? 'true' : 'false';
                    const collapseClass = index === 0 ? 'show' : '';
                    const btnClass = index === 0 ? '' : 'collapsed';
                    
                    item.innerHTML = `
                        <h2 class="accordion-header" id="heading${index}">
                            <button class="accordion-button ${btnClass}" type="button" data-bs-toggle="collapse" data-bs-target="#collapse${index}" aria-expanded="${isExpanded}" aria-controls="collapse${index}">
                                ${faq.q}
                            </button>
                        </h2>
                        <div id="collapse${index}" class="accordion-collapse collapse ${collapseClass}" aria-labelledby="heading${index}" data-bs-parent="#faqAccordion">
                            <div class="accordion-body">
                                ${faq.a}
                            </div>
                        </div>
                    `;
                    accordion.appendChild(item);
                });
            } catch (error) {
                loader.style.display = 'none';
                accordion.innerHTML = '<p class="text-center text-danger">Failed to load FAQs.</p>';
            }
        });
    </script>
</body>
</html>
