<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply for Admission | Garvotsav Tuition Classes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-glass scrolled" style="background: var(--glass-bg);">
        <div class="container">
            <a class="navbar-brand" href="../index.html">
                <i class="fa-solid fa-graduation-cap text-primary-accent"></i> Garvotsav
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="../index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="courses.html">Courses</a></li>
                    <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
                <div class="ms-lg-3 mt-3 mt-lg-0">
                    <a href="register.html" class="btn-premium btn-primary-gradient w-100 text-center active">Get Started</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="auth-section">
        <div class="container position-relative">
            <div class="row justify-content-center">
                <div class="col-md-10 col-lg-7 col-xl-6" data-aos="fade-up">
                    <div class="glass-card auth-card">
                        <div class="text-center mb-4">
                            <div class="auth-icon mb-3">
                                <i class="fa-solid fa-file-signature"></i>
                            </div>
                            <h1 class="font-heading fw-bold mb-2">Apply for Admission</h1>
                        </div>

                        <form data-auth-form data-submit-action="submitAdmission" data-success-message="Application submitted successfully! Redirecting to home page..." novalidate>
                            <div class="alert d-none" data-auth-alert role="alert"></div>

                            <div class="auth-form-stack">
                                <div class="auth-field">
                                    <label class="form-label" for="registerName">Student Full Name *</label>
                                    <input type="text" class="form-control" id="registerName" name="fullName" placeholder="Enter student full name" autocomplete="name">
                                    <div class="auth-error" aria-live="polite"></div>
                                </div>

                                <div class="auth-field">
                                    <label class="form-label" for="registerEmail">Email Address *</label>
                                    <input type="email" class="form-control" id="registerEmail" name="email" placeholder="student@example.com" autocomplete="email">
                                    <div class="auth-error" aria-live="polite"></div>
                                </div>

                                <div class="auth-field">
                                    <label class="form-label" for="registerPhone">Phone Number *</label>
                                    <input type="tel" class="form-control" id="registerPhone" name="phone" placeholder="9876543210" autocomplete="tel">
                                    <div class="auth-error" aria-live="polite"></div>
                                </div>

                                <div class="auth-field">
                                    <label class="form-label" for="applyingClass">Applying For (Class) *</label>
                                    <select class="form-select" id="applyingClass" name="applyingClass">
                                        <option value="">Select class</option>
                                        <option value="Class 8">Class 8</option>
                                        <option value="Class 9">Class 9</option>
                                        <option value="Class 10">Class 10</option>
                                    </select>
                                    <div class="auth-error" aria-live="polite"></div>
                                </div>

                                <div class="auth-field">
                                    <label class="form-label" for="subject">Subject *</label>
                                    <select class="form-select" id="subject" name="subject">
                                        <option value="">Select subject</option>
                                        <option value="Mathematics">Mathematics</option>
                                        <option value="Science">Science</option>
                                    </select>
                                    <div class="auth-error" aria-live="polite"></div>
                                </div>

                                <div class="auth-field">
                                    <label class="form-label" for="registerPassword">Password *</label>
                                    <div class="password-wrap">
                                        <input type="password" class="form-control" id="registerPassword" name="password" placeholder="Minimum 6 characters" autocomplete="new-password">
                                        <button type="button" class="password-toggle" data-toggle-password="registerPassword" aria-label="Show password">
                                            <i class="fa-solid fa-eye"></i>
                                        </button>
                                    </div>
                                    <div class="auth-error" aria-live="polite"></div>
                                </div>

                                <div class="auth-field">
                                    <label class="form-label" for="confirmPassword">Confirm Password *</label>
                                    <div class="password-wrap">
                                        <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" placeholder="Re-enter password" autocomplete="new-password">
                                        <button type="button" class="password-toggle" data-toggle-password="confirmPassword" aria-label="Show password">
                                            <i class="fa-solid fa-eye"></i>
                                        </button>
                                    </div>
                                    <div class="auth-error" aria-live="polite"></div>
                                </div>
                            </div>

                            <button type="submit" class="btn-premium btn-primary-gradient w-100 border-0 mt-3 py-3">
                                Apply for Admission <i class="fa-solid fa-arrow-right ms-2"></i>
                            </button>
                        </form>

                        <p class="auth-switch text-center mt-4 mb-0">
                            Already have an account? <a href="login.html">Login here</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer-area courses-footer" data-site-footer></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/auth.js"></script>
</body>
</html>
