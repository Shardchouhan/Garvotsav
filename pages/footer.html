<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Footer Component | Garvotsav Tuition Classes</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 2rem;
            background: #0d0d0d;
            color: #ffffff;
            font-family: Arial, sans-serif;
        }

        .notice {
            max-width: 680px;
            padding: 2rem;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            background: rgba(255,255,255,0.04);
            line-height: 1.7;
        }

        code {
            color: #9f7aea;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <main class="notice">
        <h1>Footer Source File</h1>
        <p>This file is not used by the website footer.</p>
        <p>Edit <code>components/footer.js</code>. That file controls the footer shown on every page.</p>
        <p>After editing, refresh the browser page. The footer loader now adds a fresh version number, so changes should appear immediately.</p>
    </main>
</body>
</html>
